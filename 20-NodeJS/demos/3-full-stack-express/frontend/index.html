<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Node Notes App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">
    <h1>🗒️ Node Notes App</h1>

    <form id="noteForm">
      <input 
        type="text" 
        id="noteInput" 
        placeholder="Write a note..." 
        required 
      />
      <button type="submit">Add Note</button>
    </form>

    <ul id="notesList"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
